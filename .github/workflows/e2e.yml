name: Web E2E (Playwright)

on:
  push:
    branches:
      - main
      - codex/nexaflow-v2-platform
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Chromium smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The web app boots Playwright's webServer command (`npm run start`)
      # which serves the built Next bundle. PLAYWRIGHT_BASE_URL stays at
      # the default localhost:3000.
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
      # Disable Next telemetry in CI for cleaner logs.
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Workspace install — Playwright lives under apps/web but the deps
      # graph spans the monorepo (turbo, shared packages). One root install
      # covers everything.
      - name: Install dependencies
        run: npm ci

      # Pre-build the shared + db packages so the web build can resolve them.
      - name: Build shared packages
        run: npx turbo run build --filter=@nexaflow/shared --filter=@nexaflow/db

      - name: Build web
        run: npx turbo run build --filter=@nexaflow/web

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: apps/web
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14
