x-api-build: &api-build
  context: .
  dockerfile: apps/api/Dockerfile

x-api-env: &api-env
  NODE_ENV: production
  DATABASE_URL: postgresql://nexaflow:nexaflow@postgres:5432/nexaflow_dev
  DATABASE_URL_POOLED: postgresql://nexaflow:nexaflow@pgbouncer:5432/nexaflow_dev?pgbouncer=true
  REDIS_URL: redis://redis:6379
  ELASTICSEARCH_URL: http://elasticsearch:9200
  WEB_URL: http://localhost:3000
  API_URL: http://localhost:3001
  JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
  TENANT_TOKEN_ENCRYPTION_KEY: ${TENANT_TOKEN_ENCRYPTION_KEY:-dev_tenant_encryption_master_key_change_in_prod}
  WALLET_BILLING_ENABLED: ${WALLET_BILLING_ENABLED:-false}
  WHATSAPP_MESSAGE_COST_CREDITS: ${WHATSAPP_MESSAGE_COST_CREDITS:-1}
  AI_CALL_COST_CREDITS: ${AI_CALL_COST_CREDITS:-1}

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexaflow-postgres
    environment:
      POSTGRES_DB: nexaflow_dev
      POSTGRES_USER: nexaflow
      POSTGRES_PASSWORD: nexaflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexaflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer sits in front of Postgres so many API/worker replicas can
  # share a small upstream connection budget. App queries should use
  # DATABASE_URL_POOLED (port 6432); Prisma migrations + schema diff use
  # DATABASE_URL (direct, port 5432).
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: nexaflow-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexaflow
      DB_PASSWORD: nexaflow
      DB_NAME: nexaflow_dev
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=nexaflow psql -h 127.0.0.1 -p 5432 -U nexaflow -d nexaflow_dev -c 'select 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexaflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: nexaflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["app"]
    build: *api-build
    image: nexaflow-api:dev
    container_name: nexaflow-api
    environment:
      <<: *api-env
      APP_MODE: api
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3001/api/v1/ready || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  worker:
    profiles: ["app"]
    build: *api-build
    image: nexaflow-api:dev
    container_name: nexaflow-worker
    environment:
      <<: *api-env
      APP_MODE: worker
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    image: nexaflow-web:dev
    container_name: nexaflow-web
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  default:
    name: nexaflow-network
