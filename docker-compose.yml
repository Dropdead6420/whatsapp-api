version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexaflow-postgres
    environment:
      POSTGRES_DB: nexaflow_dev
      POSTGRES_USER: nexaflow
      POSTGRES_PASSWORD: nexaflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexaflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer sits in front of Postgres so many API/worker replicas can
  # share a small upstream connection budget. App queries should use
  # DATABASE_URL_POOLED (port 6432); Prisma migrations + schema diff use
  # DATABASE_URL (direct, port 5432).
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: nexaflow-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexaflow
      DB_PASSWORD: nexaflow
      DB_NAME: nexaflow_dev
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "psql -h 127.0.0.1 -p 5432 -U nexaflow -d nexaflow_dev -c 'select 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexaflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: nexaflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  default:
    name: nexaflow-network
